<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Fireworks Surprise 🎆</title>

<style>
body{
    margin:0;
    font-family:'Comic Sans MS', cursive;
    text-align:center;
    overflow:hidden;
    background:black;
    color:white;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}

.container{
    position:relative;
    z-index:2;
    padding:30px;
}

img{
    width:180px;
    height:180px;
    border-radius:50%;
    border:4px solid white;
    margin-top:15px;
}

button{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:25px;
    cursor:pointer;
    margin:10px;
    transition:0.3s;
}

#yesBtn{ background:#00ff88; color:black; }
#noBtn{ background:#ff4444; color:white; position:relative; }

button:hover{ transform:scale(1.1); }

.hidden{ display:none; }
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>🎂 Happy Birthday HER/HIS_NAME 🎂</h1>

<p>
From YOUR_NAME 💖 <br><br>
On this legendary day… someone extremely cute was born 😜  
Yes yes I’m talking about YOU 😎✨  
</p>

<img src="yourphoto.jpg" alt="Memory">

<h2>Lifetime Birthday Offer 💍</h2>
<p>
Free hugs 🤗 <br>
Unlimited love 💖 <br>
Daily drama included 😆 <br>
No refund policy 😌
</p>

<h2>Will you be mine forever?</h2>

<button id="yesBtn" onclick="celebrate()">YES 💖</button>
<button id="noBtn" onmouseover="moveButton()">NO 🙈</button>

<h2 id="response" class="hidden"></h2>

</div>

<script>
function moveButton(){
    var button=document.getElementById("noBtn");
    var x=Math.random()*300-150;
    var y=Math.random()*300-150;
    button.style.transform="translate("+x+"px,"+y+"px)";
}

function celebrate(){
    document.getElementById("response").classList.remove("hidden");
    document.getElementById("response").innerHTML=
    "YAYYYY!!! 🎆💖 Now fireworks officially start for us forever 😎💍";
    launchFireworks();
}

/* FIREWORKS SYSTEM */
var canvas=document.getElementById("fireworks");
var ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

window.addEventListener("resize",()=>{
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
});

var particles=[];

function launchFireworks(){
    setInterval(()=>{
        let x=Math.random()*canvas.width;
        let y=Math.random()*canvas.height/2;
        createExplosion(x,y);
    },800);
}

function createExplosion(x,y){
    for(let i=0;i<80;i++){
        particles.push({
            x:x,
            y:y,
            radius:2,
            color:"hsl("+Math.random()*360+",100%,50%)",
            speedX:(Math.random()-0.5)*5,
            speedY:(Math.random()-0.5)*5,
            life:100
        });
    }
}

function animate(){
    requestAnimationFrame(animate);
    ctx.fillStyle="rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,index)=>{
        p.x+=p.speedX;
        p.y+=p.speedY;
        p.life--;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.fill();

        if(p.life<=0){
            particles.splice(index,1);
        }
    });
}

animate();
</script>

</body>
</html>
